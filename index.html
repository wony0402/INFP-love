<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INFP in love</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Gowun+Dodum&display=swap');
:root{
  --blue:#3b82f6; --blue-deep:#1e40af; --pink:#f472b6; --pink-hot:#ec4899;
  --cream:#fdf2f8; --ink:#1e1b4b; --glow:#a5b4fc;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Space Grotesk','Gowun Dodum',sans-serif;color:#fff;
  display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;
  background:#1e1b4b}

/* animated gradient bg */
.bg{position:fixed;inset:0;z-index:0;
  background:linear-gradient(135deg,#3b82f6 0%,#6366f1 35%,#a855f7 60%,#ec4899 100%);
  background-size:300% 300%;animation:grad 14s ease infinite}
@keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.blob{position:fixed;border-radius:50%;filter:blur(70px);opacity:.55;z-index:0;mix-blend-mode:screen}
.b1{width:380px;height:380px;background:#60a5fa;top:-80px;left:-60px;animation:float1 11s ease-in-out infinite}
.b2{width:340px;height:340px;background:#f472b6;bottom:-70px;right:-50px;animation:float2 13s ease-in-out infinite}
.b3{width:260px;height:260px;background:#c084fc;top:40%;left:55%;animation:float1 9s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-30px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,30px)}}

@keyframes spin{to{transform:rotate(360deg)}}

/* START */
#start{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:28px;cursor:pointer;text-align:center;padding:24px;
  background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.12),transparent 60%)}
#start .vinyl-start{width:300px;height:300px;animation:spin 16s linear infinite;
  filter:drop-shadow(0 16px 40px rgba(236,72,153,.5))}
#start h1{font-weight:700;font-size:38px;letter-spacing:-1px;line-height:1.1;
  text-shadow:0 2px 20px rgba(0,0,0,.3)}
#start .sub{font-size:15px;letter-spacing:3px;color:rgba(255,255,255,.85);font-weight:500;text-transform:uppercase}
#start .press{font-size:15px;letter-spacing:1px;margin-top:6px;font-weight:500;
  background:rgba(255,255,255,.18);padding:12px 24px;border-radius:30px;backdrop-filter:blur(8px);
  border:1.5px solid rgba(255,255,255,.35);animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.05);opacity:1}}

/* PLAYER */
#player{position:relative;width:100vw;height:100vh;overflow:hidden;display:flex;z-index:1}
.cover-disc{animation:spin 16s linear infinite;filter:drop-shadow(0 10px 30px rgba(236,72,153,.45))}
.title-plate{font-weight:700;letter-spacing:-.5px;text-align:center;
  background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.3);border-radius:18px;
  padding:12px 22px;backdrop-filter:blur(8px)}

/* intro */
#intro{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;pointer-events:none}
#intro .imsg{position:absolute;font-weight:700;font-size:32px;text-align:center;padding:0 30px;
  opacity:0;transform:translateY(18px) scale(.95);transition:opacity 1s ease,transform 1s ease;
  text-shadow:0 2px 24px rgba(0,0,0,.35)}
#intro .imsg.show{opacity:1;transform:translateY(0) scale(1)}
#intro .imsg.gone{opacity:0;transform:translateY(-18px) scale(.95)}

/* lyrics blocks */
.lyrics-wrap{position:relative;overflow:hidden;flex:1;display:flex;align-items:center;justify-content:center}
.block{position:absolute;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 28px;opacity:0;transform:translateY(30px) scale(.96);pointer-events:none;text-align:center;
  transition:opacity .9s ease,transform .9s cubic-bezier(.34,1.56,.64,1)}
.block.show{opacity:1;transform:translateY(0) scale(1)}
.block.out{opacity:0;transform:translateY(-30px) scale(.96)}
.line{font-size:26px;line-height:1.55;padding:6px 0;font-weight:500;width:100%;
  text-shadow:0 2px 18px rgba(0,0,0,.3);opacity:0;transform:translateY(14px)}
.block.show .line{animation:pop .6s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes pop{to{opacity:1;transform:translateY(0)}}
.line.hl{color:#fff;font-weight:700}

/* controls */
.controls{display:flex;flex-direction:column;gap:12px;z-index:6}
.bar{height:8px;background:rgba(255,255,255,.22);position:relative;cursor:pointer;border-radius:10px;overflow:hidden}
.fill{height:100%;width:0;background:linear-gradient(90deg,#60a5fa,#f472b6);border-radius:10px;transition:width .1s linear}
.crow{display:flex;align-items:center;justify-content:space-between;gap:14px}
.tlab{font-size:12px;font-weight:600;color:rgba(255,255,255,.85);font-variant-numeric:tabular-nums}
.btn{font-weight:700;background:#fff;color:#6366f1;border:none;padding:11px 18px;font-size:15px;cursor:pointer;
  border-radius:30px;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:transform .12s}
.btn:active{transform:scale(.92)}

/* mobile */
#player{flex-direction:column;align-items:center;max-width:560px;margin:0 auto}
.pc-left{display:none}
.head{width:100%;padding:30px 24px 8px;display:flex;flex-direction:column;align-items:center;gap:18px;z-index:6}
.head .cover-disc{width:150px;height:150px}
.head .title-plate{font-size:19px}
.main{flex:1;width:100%;display:flex;flex-direction:column;min-height:0}
.main .controls{padding:14px 24px 30px}

@media (min-width:820px) and (orientation:landscape){
  #player{flex-direction:row;max-width:none}
  .head{display:none}
  .pc-left{display:flex;flex-direction:column;align-items:center;justify-content:center;width:44%;height:100%;gap:30px;padding:40px;z-index:6}
  .pc-left .cover-disc{width:400px;height:400px}
  .pc-left .title-plate{font-size:17px}
  .main{width:56%;height:100%;padding:50px 54px;min-height:0}
  .main .pc-title{display:block !important;font-size:30px;margin-bottom:26px;align-self:flex-start}
  .main .lyrics-wrap{border:1.5px solid rgba(255,255,255,.25);border-radius:24px;background:rgba(255,255,255,.06);backdrop-filter:blur(4px)}
  .main .controls{padding:20px 6px 0}
  .line{font-size:32px}
  #intro .imsg{font-size:46px}
}
</style>
</head>

const BLOCKS = [{"start": 2.0, "end": 18.4, "lines": ["yeah, maybe I'm that type", "조용한데 너만 보면 bright light", "생각이 너무 많아도 fine", "너 하나면 mood right"]}, {"start": 18.4, "end": 28.7, "lines": ["오늘도 또 replay, 네 말 한 줄에 맘이 sway", "웃는 표정 한 장면에", "my world goes color gray → gold"]}, {"start": 28.7, "end": 39.1, "lines": ["난 느린 템포, 너는 uptown", "그래서 더 끌려 paradox sound", "감정은 깊고 말은 short", "이건 나만의 code, can't abort"]}, {"start": 39.1, "end": 49.5, "lines": ["내 머리 속엔 mixtape", "너의 말들이 전부 shape", "INFP type of faith", "진심이 습관이 돼"]}, {"start": 49.5, "end": 59.8, "lines": ["I'm an INFP in love,", "조용하지만 loud enough,", "이 리듬 속 너의 tone이", "내 하루를 바꿔 baby."]}, {"start": 59.8, "end": 70.2, "lines": ["I'm an INFP in love,", "말보다 진심이 먼저와,", "감정의 파도 위 surf,", "we vibin' under the sun."]}, {"start": 70.2, "end": 80.5, "lines": ["late night, guitar hummin',", "내 마음은 너로 strummin',", "이 노래는 diary 같아", "숨길 수가 없어 runnin'."]}, {"start": 80.5, "end": 90.9, "lines": ["네가 웃을 땐 tempo up,", "네가 침묵이면 fade out,", "I'm tryna act cool,", "but my heart's too loud."]}, {"start": 90.9, "end": 101.3, "lines": ["I'm not tryna rush the vibe,", "이 감정은 slow drive,", "너의 세상에 닿을 때까지", "keep it steady, keep it right."]}, {"start": 101.3, "end": 111.6, "lines": ["I'm an INFP in love,", "생각은 느려도 맘은 불타,", "이 순간 그대로 record해,", "band sound, heart on fire."]}, {"start": 111.6, "end": 126.0, "lines": ["I'm an INFP in love,", "너의 이름이 내 melody line,", "feel so alive, no disguise,", "INFP type love, real time."]}];
const audio=document.getElementById('audio');
const wrap=document.getElementById('wrap');
const introEl=document.getElementById('intro');
const introMsgs=[...introEl.children].map(el=>({el,t:parseFloat(el.dataset.t)}));

const blockEls=BLOCKS.map(blk=>{
  const d=document.createElement('div');d.className='block';
  blk.lines.forEach(t=>{const p=document.createElement('div');p.className='line';p.textContent=t;d.appendChild(p);});
  wrap.appendChild(d);return d;
});
function fmt(s){s=Math.max(0,s|0);return (s/60|0)+':'+String(s%60).padStart(2,'0')}

document.getElementById('start').addEventListener('click',()=>{
  document.getElementById('start').style.display='none';
  document.getElementById('player').style.display='flex';
  audio.play();setTimeout(tick,60);
});

const INTRO_END = BLOCKS[0].start;
let curBlock=-1, curIntro=-1;
function showBlock(bi){
  blockEls.forEach((el,i)=>{
    if(i===bi){el.classList.remove('out');el.classList.add('show');
      [...el.children].forEach((p,j)=>{p.style.animation='none';p.offsetHeight;p.style.animation=`pop .6s cubic-bezier(.34,1.56,.64,1) ${j*0.1}s forwards`;});
    }else if(i<bi){el.classList.remove('show');el.classList.add('out');}
    else{el.classList.remove('show','out');}
  });
}
function tick(){
  const t=audio.currentTime;
  if(t<INTRO_END){
    introEl.style.display='flex';
    let ii=-1;
    for(let i=0;i<introMsgs.length;i++){if(introMsgs[i].t<=t)ii=i;else break;}
    if(ii!==curIntro){curIntro=ii;
      introMsgs.forEach((m,i)=>{m.el.classList.remove('show','gone');
        if(i<ii)m.el.classList.add('gone');else if(i===ii)m.el.classList.add('show');});}
  }else{
    if(introEl.style.display!=='none')introEl.style.display='none';
    let bi=-1;
    for(let i=0;i<BLOCKS.length;i++){if(BLOCKS[i].start<=t+0.05)bi=i;else break;}
    if(bi!==curBlock&&bi>=0){curBlock=bi;showBlock(bi);}
  }
  const d=audio.duration||1;
  document.getElementById('fill').style.width=(audio.currentTime/d*100)+'%';
  document.getElementById('cur').textContent=fmt(audio.currentTime);
  requestAnimationFrame(tick);
}
audio.addEventListener('loadedmetadata',()=>{document.getElementById('dur').textContent=fmt(audio.duration);});
const playBtn=document.getElementById('play');
playBtn.addEventListener('click',()=>{if(audio.paused){audio.play();playBtn.textContent='❚❚';}else{audio.pause();playBtn.textContent='▶';}});
document.getElementById('bar').addEventListener('click',e=>{const r=e.currentTarget.getBoundingClientRect();audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;curBlock=-1;curIntro=-1;});
</script>
</body>
</html>
